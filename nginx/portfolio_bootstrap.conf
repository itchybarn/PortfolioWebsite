server {
    listen 80;
    server_name itchybarn.com www.itchybarn.com jackwagenheim.com www.jackwagenheim.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # you could proxy to Flask here, but i'm instead deciding to redirect to the HTTPS version of the site
    # and make users wait until it's fully up and running
    location / {
        return 301 https://itchybarn.com$request_uri;
    }
}