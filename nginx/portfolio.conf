# --- itchybarn.com ---

server {
    listen 80;
    server_name itchybarn.com www.itchybarn.com jackwagenheim.com www.jackwagenheim.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://itchybarn.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name itchybarn.com www.itchybarn.com;

    ssl_certificate /etc/letsencrypt/live/itchybarn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/itchybarn.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# --- alias: jackwagenheim.com ---

server {
    listen 443 ssl;
    server_name jackwagenheim.com www.jackwagenheim.com;

    ssl_certificate /etc/letsencrypt/live/itchybarn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/itchybarn.com/privkey.pem;

    return 301 https://itchybarn.com$request_uri;
}

